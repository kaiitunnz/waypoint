# waypoint-manager.yaml — project-local Waypoint Manager config.
#
# `waypoint manager init --manifest <this file>` persists the machine-relevant
# fields (trunk, concurrency, retry, priority, integration, timeouts) server-side,
# so `manager next`/`transition` enforce them. board, scale, escalation, and roles
# are skill-consumed: the manager reads this file directly for spawn config and
# policy. Full field and `{{placeholder}}` reference: docs/waypoint-manager.md.

project: waypoint                         # used in summaries and channel labels
trunk: main                               # branch each ticket worktree is cut from; the sole integrator advances it

board:
  tickets_channel: tickets                # intake channel + ticket:<id> registry cells ({{tickets_channel}})
  org_channel: org                        # human-visible summaries + lock:integration cell ({{org_channel}})
  ticket_channel_prefix: ticket-          # per-ticket channel is <prefix><id>, e.g. ticket-42 ({{ticket_channel}})

concurrency:
  execution_slots: 2                      # max tickets in delegated|building|revising; parked leads do not count
  max_parked_leads: null                  # optional cap on live-but-idle leads (null = unbounded)

retry:
  max_delegate_attempts: 3                # initial-spawn retries before blocked-awaiting-human
  max_lead_restarts: 3                    # fresh-lead resumes after a lead death before blocked (independent of attempts)
  backoff_seconds: 60                     # base backoff between re-delegations

priority:
  levels: [p0, p1, p2, p3]                # ordered high-to-low; a ticket's --priority must be one of these
  tiebreak: fifo                          # ties break oldest-first by created_at

scale:
  substantial_when: >-                    # triage's rule for substantial (→ spec) vs trivial (→ direct)
    needs a schema/API/UX change, touches more than one module, or has
    ambiguous intent; otherwise trivial

integration:
  mode: pr                                # pr (GitHub PR) | local (rebase-ff); manager is sole integrator either way
  require_ci_green: true                  # gate the merge on green CI

timeouts:
  human_latency_hours: 72                 # awaiting-human (spec_review/blocked/review_requested) → escalate then abandon
  lock_ttl_seconds: 900                   # integration-lease TTL; also the steal-after window for a dead owner

escalation:
  self_decide: [retryable-error, unambiguous-clarification]              # blockers the manager settles itself
  always_escalate: [product-decision, scope-change, irreversible, spec-ambiguity]   # blockers routed to the human inbox

# Each role: `preset: <name>` (verified at setup, never created) or inline
# `launch: { backend, model, permission_mode, ... }`. manager + tech_lead run
# unattended → auto-approving permission_mode (claude_code: dontAsk). manager runs on
# claude_tty so its turn survives a backend restart. Full reference: docs/waypoint-manager.md.
roles:
  manager:
    launch: { backend: claude_code, model: "opus[1m]", permission_mode: dontAsk }
    templates: templates/manager
  prd_writer:
    preset: writer-opus                   # e.g. an opus claude_code preset; must pre-exist
    templates: templates/prd-writer
  rfc_writer:
    preset: writer-opus
    templates: templates/rfc-writer
  tech_lead:
    preset: lead-opus-1m                  # OR: launch: { backend: claude_code, model: "opus[1m]", permission_mode: dontAsk }
    templates: templates/tech-lead
