version: 2
updates:
  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: weekly
    commit-message:
      prefix: "build"

  - package-ecosystem: uv
    directory: /waypointctl
    schedule:
      interval: weekly
    commit-message:
      prefix: "build"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    commit-message:
      prefix: "build"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
