name: Check PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-title:
    name: Check PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commits title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # We squash-merge, so the PR title becomes the commit on main and
          # drives release-please — it must be a Conventional Commit.
          pattern='^(feat|fix|docs|refactor|perf|test|build|ci|chore)(\([a-z0-9 ._/-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title is not a Conventional Commit: '$PR_TITLE'"
            echo "Expected: <type>[(scope)][!]: <description>"
            echo "Types: feat, fix, docs, refactor, perf, test, build, ci, chore"
            exit 1
          fi
          echo "PR title OK: $PR_TITLE"
