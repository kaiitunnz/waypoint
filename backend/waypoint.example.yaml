host: 0.0.0.0
port: 8787
password: change-me
default_backend: codex
default_cwd: ~/
data_dir: ~/Library/Application Support/Waypoint
cors_origins: []
# cors_allow_origin_regex: ^https?://(localhost|127\.0\.0\.1|100\.\d{1,3}\.\d{1,3}\.\d{1,3})(:\d+)?$
# chat_page_messages: 20  # latest N *logical* chat messages per page.
                          # Codex streams a single agent reply as
                          # hundreds of same-item_id deltas; the
                          # paginator collapses each delta run (and each
                          # tool_call+tool_result pair) into one unit so
                          # a page of N reliably surfaces N bubbles.

# Per-plugin config blocks keyed by plugin id. Each block is validated
# against the plugin's `config_schema` (see `backends/<id>/plugin.py`).
# Keys here must match a registered plugin; unknown ids fail
# validation. Omit a block to use the schema's defaults.
plugin_configs:
  codex:
    # default_model: gpt-5
    # default_effort: high
  claude_code:
    # default_model: opus
    # default_effort: high
    # models:
    #   - id: opus
    #     label: Opus 4.7
    #     is_default: true

ssh_targets:
  - id: devbox
    name: SSH coding backend
    ssh_destination: dev@example.com
    ssh_args:
      - -p
      - "2222"
    # Per-plugin remote binary overrides keyed by plugin id; missing
    # entries fall back to the plugin's `capabilities.cli_binary`.
    remote_bins:
      codex: codex
      claude_code: claude
    default_cwd: "~"
    # Default `bash -ilc` (interactive + login) sources the full rcfile chain
    # so PATH from `.bashrc` (nvm/cargo/pyenv/etc.) is available. Switch to
    # `bash -lc` if your `.bashrc` writes to stdout (would corrupt the stream).
    remote_shell: bash -ilc
    supported_backends:
      - codex
      - claude_code
    config_overrides:
      - model_reasoning_effort="high"
    remote_env:
      OPENAI_API_KEY: sk-your-key
