host: 0.0.0.0
port: 8787
password: change-me
data_dir: ~/Library/Application Support/Waypoint
cors_origins: []
# cors_allow_origin_regex: ^https?://(localhost|127\.0\.0\.1|100\.\d{1,3}\.\d{1,3}\.\d{1,3})(:\d+)?$

codex_remote:
  enabled: true
  ssh_destination: dev@example.com
  ssh_args:
    - -p
    - "2222"
  codex_bin: codex
  config_overrides:
    - model_reasoning_effort="high"
  remote_env:
    OPENAI_API_KEY: sk-your-key
  cwd_mappings:
    - local_prefix: /Users/Shared/D/MySandbox
      remote_prefix: /srv/waypoint
