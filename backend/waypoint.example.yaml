host: 0.0.0.0
port: 8787
password: change-me
default_backend: codex
default_cwd: ~/
data_dir: ~/.waypoint/backend-data
cors_origins: []
# cors_allow_origin_regex: defaults to localhost, Tailscale IPs, and MagicDNS names.
# chat_page_messages: 20  # latest N *logical* chat messages per page.
                          # Codex streams a single agent reply as
                          # hundreds of same-item_id deltas; the
                          # paginator collapses each delta run (and each
                          # tool_call+tool_result pair) into one unit so
                          # a page of N reliably surfaces N bubbles.

# Workspace file preview (the file explorer in the chat window). Reads files
# under each *local* session's working dir; remote (SSH) sessions are excluded.
# workspace_preview_enabled: true
# workspace_denylist:            # globs hidden from the tree/preview, matched
#   - .git                       #   per path component, case-insensitively.
#   - .ssh                       # Default hides VCS internals and SSH keys only,
#                                #   so ordinary dotfiles like .env preview. Use
#                                #   [".*"] to hide all dotfiles, or [] to disable
#                                #   filtering entirely. Env: WAYPOINT_WORKSPACE_DENYLIST
#                                #   (comma-separated).
# workspace_max_file_bytes: 200000   # larger files preview as a placeholder
# workspace_follow_symlinks: false   # if true, allow paths through symlinks that
#                                    #   still resolve inside the working dir
# workspace_git_enabled: true        # show git status + per-file diffs in the
#                                    #   explorer (no-op outside a git repo).
#                                    #   Env: WAYPOINT_WORKSPACE_GIT_ENABLED

# Per-plugin config blocks keyed by plugin id. Each block is validated
# against the plugin's `config_schema` (see `backends/<id>/plugin.py`).
# Keys here must match a registered plugin; unknown ids fail
# validation. Omit a block to use the schema's defaults.
#
# `env` values reach the agent process directly for the structured local
# transports (claude_code, codex, and opencode adapters). For the tmux /
# claude_tty and SSH-remote transports they are rendered into the launch
# command line, so on a shared host another user can read them via `ps`.
# Prefer host/SSH environment over `env` for secrets on those transports.
plugin_configs:
  codex:
    # default_model_id: gpt-5
    # default_effort: high
    # local_bin: /opt/codex/bin/codex   # absolute path or PATH name (e.g. `codex`) of a
    #                                    #   system codex to launch locally. Unset uses the
    #                                    #   binary bundled with the pinned openai-codex SDK.
    # env:                              # editable defaults surfaced in the launch panel
    #   OPENAI_API_KEY: sk-your-key
    # cli_args:                              # raw flags for `codex …` before `app-server`
    #   - "--verbose"
    # config_overrides:                      # codex-only; each entry → `codex --config K=V`
    #   - 'model_reasoning_effort="high"'
    # account_profiles:                      # named CODEX_HOME profiles; see docs/account_profiles.md
    #   personal:
    #     label: Personal
    #     config_dir: ~/.codex
    #   work:
    #     label: Work
    #     config_dir: ~/.codex-work
    #     transcript_policy: copy_thread_on_switch  # require_existing | symlink_shared | copy_thread_on_switch
    #     expected_account_key: codex:work@example.com   # gate the switch to this account (optional)
  claude_code:
    # default_model_id: opus
    # default_effort: high
    # local_bin: /opt/claude/bin/claude
    # env:
    #   ANTHROPIC_AUTH_TOKEN: sk-ant-your-key
    # cli_args:
    #   - "--dangerously-skip-permissions"
    # models:
    #   - id: opus
    #     label: Opus 4.7
    #     is_default: true
    # account_profiles:                      # named CLAUDE_CONFIG_DIR profiles; see docs/account_profiles.md
    #   personal:
    #     label: Personal
    #     config_dir: ~/.claude
    #   work:
    #     label: Work
    #     config_dir: ~/.claude-work
    #     transcript_policy: copy_thread_on_switch  # require_existing | symlink_shared | copy_thread_on_switch
    #     expected_account_key: claude_code:acme-corp   # gate the switch to this account (optional)
  opencode:
    # default_model_id: anthropic/claude-sonnet-4-6
    # default_effort: high
    # local_bin: /opt/codex/bin/opencode
    # env:
    #   OPENAI_API_KEY: sk-your-key
    # cli_args:
    #   - "--max-iterations=50"

# Personal-assistant singleton. Omit this block entirely to disable it.
# When present (and `enabled` is not false) the runtime keeps a single
# long-lived session of `backend` alive, reachable from the assistant UI
# page. It can answer host-environment questions, inspect Waypoint
# sessions, and manage them via the `waypoint sessions` CLI. `model`,
# `effort`, `permission_mode`, and `transport` seed the thread; the UI can
# override them live. Switching `backend` replaces the thread on next restart.
# assistant:
#   enabled: true
#   backend: claude_code          # defaults to `default_backend`
#   account_profile_id: work      # named config/account profile for first creation
#   model: opus                   # must exist in the backend's catalogue
#   effort: high                  # ignored by backends without an effort knob
#   permission_mode: bypassPermissions  # backend default (usually prompts) if unset
#   transport: claude_cli         # agent default (Emulated for Claude Code) if unset

# Usage telemetry backing the Telemetry dashboard (aggregate-only, local, no
# content capture). Opt-in and OFF by default: while disabled, nothing is
# collected, the dashboard link is hidden, and telemetry read APIs 404.
# Set telemetry_enabled: true and restart the backend to turn it on. See
# docs/telemetry.md. All other values shown at their defaults.
# telemetry_enabled: false
# telemetry_backfill: false                 # one-time import of history from
#                                           # sessions that predate activation.
#                                           # Separate opt-in: enabling live
#                                           # collection does not import history
#                                           # unless this is also true.
# telemetry_retention_days: 90              # fact-level retention
# telemetry_rollup_retention_months: 13     # daily-rollup retention
# telemetry_context_thresholds: [70, 90, 100]  # context/limit warning thresholds
# telemetry_local_labels: false             # show provider account labels instead
#                                           # of the pseudonymous key (opt-in)

# Opt-in NL-insight summarizer for the Telemetry dashboard. Off by default —
# enabling it sends telemetry aggregates + redacted drill-down samples
# (never raw prompts/outputs/tool args/paths) to the configured coding agent
# so it can generate a short prose digest. `managed` mode drives the agent
# through a throwaway one-shot session launched the normal way (so
# `claude_tty` gets correct config-dir/account-profile handling); `headless`
# allows a raw one-shot subprocess for setups where a full session is
# overkill, but is never the default.
# telemetry_nl:
#   enabled: false
#   backend: claude_code
#   transport: claude_tty
#   model: haiku                  # cheap/fast model recommended for a digest
#   account_profile: work
#   mode: managed                 # managed | headless
#   interval_hours: 168           # weekly digest cadence
#   preset: telemetry-digest      # optional session preset (id or name); overrides
#                                 # backend/transport/model/account_profile above
#                                 # wherever the preset itself sets them

ssh_targets:
  - id: devbox
    name: SSH coding backend
    ssh_destination: dev@example.com
    # Multiplex SSH so subsequent calls reuse the master (~100ms
    # instead of ~1–2s per fresh handshake). See README for details.
    ssh_args:
      - -o
      - ControlMaster=auto
      - -o
      - ControlPath=~/.ssh/cm-%C
      - -o
      - ControlPersist=600s
      - -p
      - "2222"
    # Per-plugin per-target config blocks. Presence of a key means
    # "this target supports the plugin"; omitting `plugin_configs`
    # entirely means "supports every registered non-fallback plugin
    # with defaults". Each block is validated against the plugin's
    # `launch_target_schema` (see `backends/<id>/plugin.py`).
    plugin_configs:
      codex:
        # remote_bin: /opt/codex/bin/codex     # path on the remote host
        # env:                                  # editable defaults for this target/backend
        #   OPENAI_API_KEY: sk-your-key
        # cli_args:                            # raw flags before `app-server`
        #   - "--verbose"
        config_overrides:                      # codex --config K=V
          - model_reasoning_effort="high"
      claude_code:
        # remote_bin: /opt/claude/bin/claude
        # env:
        #   ANTHROPIC_AUTH_TOKEN: sk-ant-your-key
        # cli_args:
        #   - "--dangerously-skip-permissions"
      opencode:
        # remote_bin: /opt/codex/bin/opencode
        # env:
        #   OPENAI_API_KEY: sk-your-key
        # cli_args:
        #   - "--max-iterations=50"
    default_cwd: "~"
    # Default `bash -ilc` (interactive + login) sources the full rcfile chain
    # so PATH from `.bashrc` (nvm/cargo/pyenv/etc.) is available. Switch to
    # `bash -lc` if your `.bashrc` writes to stdout (would corrupt the stream).
    remote_shell: bash -ilc
    remote_env:
      OPENAI_API_KEY: sk-your-key
    # SSH authentication. `key` (the default) delegates to the local ssh
    # binary's key/agent discovery. Set to `password` to have Waypoint prompt
    # for the SSH password in the UI when connecting; the password seeds the
    # ControlMaster connection above and is never stored or written to disk.
    # Password auth REQUIRES the ControlMaster/ControlPath/ControlPersist args
    # above (config load fails otherwise) and OpenSSH >= 8.4 on the host.
    # ssh_auth: password
