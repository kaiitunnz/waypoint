host: 0.0.0.0
port: 8787
password: change-me
default_backend: codex
default_cwd: ~/
data_dir: ~/Library/Application Support/Waypoint
cors_origins: []
# cors_allow_origin_regex: ^https?://(localhost|127\.0\.0\.1|100\.\d{1,3}\.\d{1,3}\.\d{1,3})(:\d+)?$

ssh_targets:
  - id: devbox
    name: SSH coding backend
    ssh_destination: dev@example.com
    ssh_args:
      - -p
      - "2222"
    codex_bin: codex
    claude_bin: claude
    default_cwd: "~"
    # Default `bash -ilc` (interactive + login) sources the full rcfile chain
    # so PATH from `.bashrc` (nvm/cargo/pyenv/etc.) is available. Switch to
    # `bash -lc` if your `.bashrc` writes to stdout (would corrupt the stream).
    remote_shell: bash -ilc
    supported_backends:
      - codex
      - claude_code
    config_overrides:
      - model_reasoning_effort="high"
    remote_env:
      OPENAI_API_KEY: sk-your-key
